name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: civitas
          POSTGRES_PASSWORD: civitas
          POSTGRES_DB: civitas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U civitas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run schema migrations
        env:
          DATABASE_URL: postgresql://civitas:civitas@localhost:5432/civitas
        run: |
          for f in sql/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://civitas:civitas@localhost:5432/civitas
          ANTHROPIC_API_KEY: test-key
        run: python3 -m pytest backend/tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Lint Python
        run: ruff check backend/ --select E,W,F --ignore E501
